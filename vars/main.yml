---
# =============================================================================
# Percona Server Role — Internal Role Constants
# These are role internals, NOT meant to be overridden by users.
# User-facing toggles and tuning variables belong in defaults/main.yml.
# =============================================================================

version: "8.0"

percona_packages:
  - gnupg2
  - python3-pip
  - "percona-server-server"

mysql_daemon:             mysql
mysql_config_file:        /etc/mysql/my.cnf
mysql_slow_query_log_file: /var/log/mysql/mysql-slow.log
mysql_socket:             /var/run/mysqld/mysqld.sock
mysql_pid_file:           /var/run/mysqld/mysqld.pid
mysql_log_error:          /var/log/mysql/mysql.err
mysql_root_username:      root

# replication and backup have been moved to defaults/main.yml so they can be
# overridden from inventory, group_vars, or Semaphore extra-vars.
# DO NOT re-add them here — vars/ takes higher precedence and would
# silently ignore any override attempt.

mysql_backup_config_file: /etc/mysql/backup.cnf
mysql_backup_directory:   /backups/mysql
