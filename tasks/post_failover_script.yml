---
# =============================================================================
# Post-Failover Script Deployment
# Script uses MySQL client only — no SSH required (LDC environment)
# =============================================================================

- name: Deploy post-failover action script
  ansible.builtin.template:
    src:   post-failover-action.sh.j2
    dest:  "{{ ha_failover_script_path }}"
    owner: root
    group: root
    mode:  "0755"

- name: Validate post-failover script syntax
  ansible.builtin.command: >
    bash -n {{ ha_failover_script_path }}
  changed_when: false
  register: script_syntax_check
  failed_when: script_syntax_check.rc != 0
