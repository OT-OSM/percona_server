---
# =============================================================================
# HA Backup Scripts — runs on slave/backup nodes
# xtrabackup streams directly to MinIO — no local disk usage
# =============================================================================

- name: Install percona-xtrabackup-80
  ansible.builtin.apt:
    name:         "percona-xtrabackup-80"
    update_cache: true
    state:        present

- name: Install qpress from apt
  ansible.builtin.apt:
    name:  "qpress"
    state: present
  register: qpress_apt
  failed_when: false

- name: Download qpress deb if apt failed
  ansible.builtin.get_url:
    url:  "https://repo.percona.com/apt/pool/main/q/qpress/qpress_11-3.{{ ansible_lsb.codename }}_amd64.deb"
    dest: "/tmp/qpress.deb"
    mode: "0644"
  when: qpress_apt.failed | default(false)

- name: Install qpress from deb if apt failed
  ansible.builtin.apt:
    deb:   "/tmp/qpress.deb"
    state: present
  when: qpress_apt.failed | default(false)

- name: Check if mc client already exists
  ansible.builtin.stat:
    path: "{{ ha_mc_install_path }}"
  register: mc_binary_stat_slave

- name: Download MinIO client (mc)
  ansible.builtin.get_url:
    url:   "https://dl.min.io/client/mc/release/linux-amd64/mc"
    dest:  "{{ ha_mc_install_path }}"
    mode:  "0755"
    owner: root
    group: root
  when: not mc_binary_stat_slave.stat.exists

- name: Configure mc alias
  ansible.builtin.command: >
    {{ ha_mc_install_path }} alias set {{ ha_minio_alias }}
    {{ ha_minio_endpoint }}
    {{ ha_minio_root_user }}
    {{ ha_minio_root_password }}
    --insecure
  changed_when: false
  no_log: true

- name: Create backup metadata directory
  ansible.builtin.file:
    path:  "{{ ha_backup_lsn_file | dirname }}"
    state: directory
    owner: root
    group: root
    mode:  "0755"

- name: Create backup log file
  ansible.builtin.file:
    path:              "{{ ha_backup_log_file }}"
    state:             touch
    owner:             root
    group:             root
    mode:              "0644"
    modification_time: preserve
    access_time:       preserve

- name: Deploy full backup script
  ansible.builtin.template:
    src:   mysql-full-backup.sh.j2
    dest:  "{{ ha_backup_scripts_path }}/mysql-full-backup.sh"
    owner: root
    group: root
    mode:  "0755"

- name: Deploy incremental backup script
  ansible.builtin.template:
    src:   mysql-incremental-backup.sh.j2
    dest:  "{{ ha_backup_scripts_path }}/mysql-incremental-backup.sh"
    owner: root
    group: root
    mode:  "0755"

- name: Setup full backup cron job
  ansible.builtin.cron:
    name:    "MySQL HA full backup — weekly"
    minute:  "{{ ha_backup_full_cron_minute }}"
    hour:    "{{ ha_backup_full_cron_hour }}"
    weekday: "{{ ha_backup_full_cron_weekday }}"
    job:     "{{ ha_backup_scripts_path }}/mysql-full-backup.sh >> {{ ha_backup_log_file }} 2>&1"
    user:    root
    state:   present
  when: >
    setup_backup_cron | default(false) or
    mysql_backup_server | default(false)

- name: Setup incremental backup cron job
  ansible.builtin.cron:
    name:    "MySQL HA incremental backup — daily"
    minute:  "{{ ha_backup_inc_cron_minute }}"
    hour:    "{{ ha_backup_inc_cron_hour }}"
    weekday: "{{ ha_backup_inc_cron_weekday }}"
    job:     "{{ ha_backup_scripts_path }}/mysql-incremental-backup.sh >> {{ ha_backup_log_file }} 2>&1"
    user:    root
    state:   present
  when: >
    setup_backup_cron | default(false) or
    mysql_backup_server | default(false)
