---
# =============================================================================
# Replication Setup
# This file is included for BOTH master and slave plays.
# Every task has an explicit `when` condition so it only runs on the
# correct host — master tasks are skipped on slave and vice versa.
# =============================================================================

# -----------------------------------------------------------------------------
# MASTER-ONLY tasks
# These run during the master play (inventory_hostname in percona-master)
# -----------------------------------------------------------------------------

- name: Set master address fact
  ansible.builtin.set_fact:
    master_address: "{{ inventory_hostname }}"
  when: inventory_hostname in groups['percona-master']

- name: Ensure replication user exists on master
  community.mysql.mysql_user:
    name: "{{ mysql_replication_user.name }}"
    host: "{{ item }}"
    password: "{{ mysql_replication_user.password }}"
    login_password: "{{ mysql_root_password }}"
    login_port: "{{ mysql_port }}"
    priv: "{{ mysql_replication_user.priv | default('*.*:REPLICATION SLAVE,REPLICATION CLIENT') }}"
    state: present
  loop: "{{ groups['percona-slave'] }}"
  no_log: true
  when:
    - inventory_hostname in groups['percona-master']
    - mysql_replication_user.name is defined

- name: Get master binary log status
  community.mysql.mysql_replication:
    mode: getprimary
    login_password: "{{ mysql_root_password }}"
    login_port: "{{ mysql_port }}"
  register: master_status
  when: inventory_hostname in groups['percona-master']

- name: Store master binlog info as persistent facts
  ansible.builtin.set_fact:
    master_binlog_file: "{{ master_status.File }}"
    master_binlog_pos:  "{{ master_status.Position }}"
    master_ip:          "{{ inventory_hostname }}"
  when: inventory_hostname in groups['percona-master']

# -----------------------------------------------------------------------------
# SLAVE-ONLY tasks
# These run during the slave play (inventory_hostname in percona-slave)
# By this point the master play has fully completed and hostvars for the
# master host (including master_binlog_file, master_binlog_pos, master_ip)
# are available via hostvars[groups['percona-master'][0]]
# -----------------------------------------------------------------------------

- name: Check current replica status
  community.mysql.mysql_replication:
    mode: getreplica
    login_password: "{{ mysql_root_password }}"
    login_port: "{{ mysql_port }}"
  register: slave_status
  failed_when: false
  when: inventory_hostname in groups['percona-slave']

- name: Configure replica to point to master
  community.mysql.mysql_replication:
    mode: changeprimary
    primary_host:     "{{ hostvars[groups['percona-master'][0]]['master_ip'] }}"
    primary_user:     "{{ mysql_replication_user.name }}"
    primary_password: "{{ mysql_replication_user.password }}"
    primary_port:     "{{ mysql_port }}"
    primary_log_file: "{{ hostvars[groups['percona-master'][0]]['master_binlog_file'] }}"
    primary_log_pos:  "{{ hostvars[groups['percona-master'][0]]['master_binlog_pos'] }}"
    login_password:   "{{ mysql_root_password }}"
    login_port:       "{{ mysql_port }}"
  no_log: true
  register: configure_replica
  failed_when:
    - configure_replica is failed
    - "'already' not in (configure_replica.msg | default(''))"
  when:
    - inventory_hostname in groups['percona-slave']
    - mysql_replication_user.name is defined
    - mysql_replication_user.password is defined
    - (slave_status.Is_Replica is not defined) or
      (slave_status.Is_Replica is defined and not slave_status.Is_Replica)

- name: Start replica
  community.mysql.mysql_replication:
    mode: startreplica
    login_password: "{{ mysql_root_password }}"
    login_port:     "{{ mysql_port }}"
  when:
    - inventory_hostname in groups['percona-slave']
    - (slave_status.Is_Replica is not defined) or
      (slave_status.Is_Replica is defined and not slave_status.Is_Replica)