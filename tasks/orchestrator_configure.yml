---
# =============================================================================
# Orchestrator Configuration
# Creates backend DB/user, deploys config, then starts service
# =============================================================================

- name: Create orchestrator backend database on orchestrator host
  community.mysql.mysql_db:
    name:           "{{ ha_orchestrator_backend_user.database }}"
    login_user:     "{{ mysql_root_username }}"
    login_password: "{{ mysql_root_password }}"
    state: present

- name: Create orchestrator backend DB user on orchestrator host
  community.mysql.mysql_user:
    name:           "{{ ha_orchestrator_backend_user.name }}"
    host:           "localhost"
    password:       "{{ ha_orchestrator_backend_user.password }}"
    priv:           "{{ ha_orchestrator_backend_user.database }}.*:ALL"
    login_user:     "{{ mysql_root_username }}"
    login_password: "{{ mysql_root_password }}"
    state: present
  no_log: true

- name: Deploy orchestrator configuration file
  ansible.builtin.template:
    src:   orchestrator.conf.json.j2
    dest:  "{{ ha_orchestrator_config_file }}"
    owner: root
    group: root
    mode:  "0640"
  notify: restart_orchestrator

- name: Flush handlers to apply config
  ansible.builtin.meta: flush_handlers

- name: Enable orchestrator service
  ansible.builtin.service:
    name:    "{{ orchestrator_service_name }}"
    enabled: true

- name: Ensure orchestrator service is started
  ansible.builtin.service:
    name:  "{{ orchestrator_service_name }}"
    state: started

- name: Wait for orchestrator API to be ready
  ansible.builtin.wait_for:
    host:    127.0.0.1
    port:    "{{ ha_orchestrator_port }}"
    timeout: 120
    delay:   5

- name: Discover master node in orchestrator
  ansible.builtin.uri:
    url: >-
      http://localhost:{{ ha_orchestrator_port }}/api/discover/{{
      hostvars[groups[ha_master_group][0]]['ansible_default_ipv4']['address']
      }}/{{ mysql_port }}
    method:      GET
    status_code: 200
  register: orchestrator_discover
  retries:  5
  delay:    5
  until:    orchestrator_discover.status == 200
  failed_when: false
