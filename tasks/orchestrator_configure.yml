---
# =============================================================================
# Orchestrator Configuration
# Config deployed first, then service started
# =============================================================================

- name: Deploy orchestrator configuration file
  ansible.builtin.template:
    src:   orchestrator.conf.json.j2
    dest:  "{{ ha_orchestrator_config_file }}"
    owner: root
    group: root
    mode:  "0640"

- name: Enable and start orchestrator service
  ansible.builtin.service:
    name:    "{{ orchestrator_service_name }}"
    state:   started
    enabled: true

- name: Restart orchestrator to apply config
  ansible.builtin.service:
    name:  "{{ orchestrator_service_name }}"
    state: restarted

- name: Wait for orchestrator API to be ready
  ansible.builtin.wait_for:
    host:    127.0.0.1
    port:    "{{ ha_orchestrator_port }}"
    timeout: 60

- name: Discover master node in orchestrator
  ansible.builtin.uri:
    url: >-
      http://localhost:{{ ha_orchestrator_port }}/api/discover/{{
      hostvars[groups[ha_master_group][0]]['ansible_default_ipv4']['address']
      }}/{{ mysql_port }}
    method:      GET
    status_code: 200
  register: orchestrator_discover
  retries:  5
  delay:    5
  until:    orchestrator_discover.status == 200
  failed_when: false
