---
- name: Get MySQL version
  ansible.builtin.command: 'mysql --version'
  register: mysql_cli_version
  changed_when: false
  check_mode: false

- name: Copy percona global configuration file
  ansible.builtin.template:
    src: mysqld.cnf.j2
    dest: "{{ mysql_config_file }}"
    owner: root
    group: root
    mode: "0644"
  notify: restart_percona
  register: mysql_config

- name: Create slow query log file
  ansible.builtin.file:
    path: "{{ mysql_slow_query_log_file }}"
    state: touch
    owner: mysql
    group: mysql
    mode: "0640"
    modification_time: preserve
    access_time: preserve
  when: mysql_slow_query_log_enabled

- name: Create datadir of MySQL
  ansible.builtin.file:
    path: "{{ mysql_datadir }}"
    state: directory
    owner: mysql
    group: mysql
    mode: "0755"
    setype: mysqld_db_t

- name: Create error log file
  ansible.builtin.file:
    path: "{{ mysql_log_error }}"
    state: touch
    owner: mysql
    group: mysql
    mode: "0640"
    modification_time: preserve
    access_time: preserve
  when:
    - mysql_log | default(true)
    - mysql_log_error | default(false)

- name: Ensure MySQL is started and enabled
  ansible.builtin.service:
    name: "{{ mysql_daemon }}"
    state: started
    enabled: true
  register: mysql_service_configuration

# Flush handlers immediately after config — ensures MySQL restarts
# before replication tasks run, picking up server-id and GTID settings.
- name: Flush handlers to apply config changes
  ansible.builtin.meta: flush_handlers

# Explicit restart if config changed but MySQL was already running
# (handler only fires on 'changed' — this catches reruns where config
# was already written but MySQL never restarted to pick it up)
- name: Restart MySQL if config was updated
  ansible.builtin.service:
    name: "{{ mysql_daemon }}"
    state: restarted
  when: mysql_config is changed