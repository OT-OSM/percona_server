---
# =============================================================================
# Secure Installation Tasks
# Runs after MySQL starts. Uses Unix socket auth for the initial setup,
# then switches to password auth once root password is set.
#
# NOTE: Most write operations (ALTER USER, INSTALL COMPONENT etc.) are
# skipped on slave because super_read_only = ON blocks all writes.
# The slave inherits these settings via replication from master.
# =============================================================================

- name: Check MySQL socket login (pre-password state)
  ansible.builtin.command: >
    mysql --protocol=socket -S {{ mysql_socket }} -NBe "SELECT 1"
  register: mysql_socket_check
  changed_when: false
  failed_when: false

# Master-only: Install validate_password component
# Slave replicates this automatically via binlog.
- name: Install validate_password component
  community.mysql.mysql_query:
    query: "INSTALL COMPONENT 'file://component_validate_password'"
    login_unix_socket: "{{ mysql_socket }}"
  register: vp_install
  failed_when:
    - vp_install.failed is defined
    - vp_install.failed
    - "'already exists' not in (vp_install.msg | default(''))"
  when:
    - mysql_socket_check.rc == 0
    - inventory_hostname in groups['percona-master']

# Master-only: Disallow root remote login
- name: Disallow root login remotely
  community.mysql.mysql_user:
    name: "{{ mysql_root_username }}"
    host: "%"
    state: absent
    login_unix_socket: "{{ mysql_socket }}"
  when:
    - mysql_socket_check.rc == 0
    - inventory_hostname in groups['percona-master']

# Master-only: Remove anonymous users
- name: Get list of hosts for the anonymous user
  ansible.builtin.command: >
    mysql --protocol=socket -S {{ mysql_socket }}
    -NBe 'SELECT Host FROM mysql.user WHERE User = ""'
  register: mysql_anonymous_hosts
  changed_when: false
  check_mode: false
  when:
    - mysql_socket_check.rc == 0
    - inventory_hostname in groups['percona-master']

- name: Remove anonymous MySQL users
  community.mysql.mysql_user:
    name: ""
    host: "{{ item }}"
    state: absent
    login_unix_socket: "{{ mysql_socket }}"
  with_items: "{{ mysql_anonymous_hosts.stdout_lines | default([]) }}"
  when:
    - mysql_socket_check.rc == 0
    - inventory_hostname in groups['percona-master']

# Root password — set on master only via socket.
# Slave root password is set during initial MySQL install
# and managed separately since super_read_only blocks ALTER USER.
- name: Get list of hosts for the root user
  ansible.builtin.command: >
    mysql --protocol=socket -S {{ mysql_socket }}
    -NBe "SELECT Host FROM mysql.user
    WHERE User = '{{ mysql_root_username }}'
    ORDER BY (Host='localhost') ASC"
  register: mysql_root_hosts
  changed_when: false
  check_mode: false
  when:
    - mysql_socket_check.rc == 0
    - inventory_hostname in groups['percona-master']

- name: Ensure root password is set
  ansible.builtin.shell: >
    mysql --protocol=socket -S {{ mysql_socket }} -u root -NBe
    'ALTER USER "{{ mysql_root_username }}"@"{{ item }}"
    IDENTIFIED WITH caching_sha2_password BY "{{ mysql_root_password }}";'
  with_items: "{{ mysql_root_hosts.stdout_lines | default([]) }}"
  no_log: true
  when:
    - mysql_socket_check.rc == 0
    - inventory_hostname in groups['percona-master']
    - mysql_install_packages | bool or mysql_root_password_update