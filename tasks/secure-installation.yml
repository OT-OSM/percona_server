---
# =============================================================================
# Secure Installation Tasks
# Uses password auth — socket auth not available (caching_sha2_password)
# Write operations skipped on slave because super_read_only = ON.
# Slave inherits these settings via replication from master.
# =============================================================================

- name: Check MySQL login with password
  ansible.builtin.command: >
    mysql
    -u {{ mysql_root_username }}
    -p{{ mysql_root_password }}
    --connect-timeout=10
    -NBe "SELECT 1"
  register: mysql_login_check
  changed_when: false
  failed_when: false
  no_log: true

# Master-only: Install validate_password component
# Slave replicates this automatically via binlog.
- name: Install validate_password component
  community.mysql.mysql_query:
    query: "INSTALL COMPONENT 'file://component_validate_password'"
    login_user:     "{{ mysql_root_username }}"
    login_password: "{{ mysql_root_password }}"
  register: vp_install
  failed_when:
    - vp_install.failed is defined
    - vp_install.failed
    - "'already exists' not in (vp_install.msg | default(''))"
  when:
    - mysql_login_check.rc == 0
    - inventory_hostname in groups['percona-master']

# Master-only: Disallow root remote login
- name: Disallow root login remotely
  community.mysql.mysql_user:
    name:           "{{ mysql_root_username }}"
    host:           "%"
    state:          absent
    login_user:     "{{ mysql_root_username }}"
    login_password: "{{ mysql_root_password }}"
  when:
    - mysql_login_check.rc == 0
    - inventory_hostname in groups['percona-master']

# Master-only: Remove anonymous users
- name: Get list of hosts for the anonymous user
  ansible.builtin.command: >
    mysql
    -u {{ mysql_root_username }}
    -p{{ mysql_root_password }}
    --connect-timeout=10
    -NBe 'SELECT Host FROM mysql.user WHERE User = ""'
  register: mysql_anonymous_hosts
  changed_when: false
  no_log: true
  when:
    - mysql_login_check.rc == 0
    - inventory_hostname in groups['percona-master']

- name: Remove anonymous MySQL users
  community.mysql.mysql_user:
    name:           ""
    host:           "{{ item }}"
    state:          absent
    login_user:     "{{ mysql_root_username }}"
    login_password: "{{ mysql_root_password }}"
  with_items: "{{ mysql_anonymous_hosts.stdout_lines | default([]) }}"
  when:
    - mysql_login_check.rc == 0
    - inventory_hostname in groups['percona-master']

# Root password set on all nodes individually
# Slave cannot use ALTER USER via replication when super_read_only=ON
- name: Get list of hosts for the root user
  ansible.builtin.command: >
    mysql
    -u {{ mysql_root_username }}
    -p{{ mysql_root_password }}
    --connect-timeout=10
    -NBe "SELECT Host FROM mysql.user
    WHERE User = '{{ mysql_root_username }}'
    ORDER BY (Host='localhost') ASC"
  register: mysql_root_hosts
  changed_when: false
  no_log: true
  when:
    - mysql_login_check.rc == 0

- name: Ensure root password is set
  ansible.builtin.shell: >
    mysql
    -u {{ mysql_root_username }}
    -p{{ mysql_root_password }}
    --connect-timeout=10
    -NBe
    'ALTER USER "{{ mysql_root_username }}"@"{{ item }}"
    IDENTIFIED WITH caching_sha2_password
    BY "{{ mysql_root_password }}";'
  with_items: "{{ mysql_root_hosts.stdout_lines | default([]) }}"
  no_log: true
  when:
    - mysql_login_check.rc == 0
    - mysql_install_packages | bool or mysql_root_password_update
